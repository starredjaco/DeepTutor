# --- Global evaluation defaults (single source of truth) ---
evaluation:
  llm_extract: true
  llm_judge: true
  extract_model: anthropic/claude-sonnet-4.6:nitro
  extract_temperature: 0.0
  extract_max_tokens: 16384
  judge_model: anthropic/claude-sonnet-4.6:nitro
  judge_temperature: 0.0
  judge_max_tokens: 16384

# ======================================================================
# MATH Benchmark Configuration
# ======================================================================
# python -m benchmark.iso_solve.run_benchmark --mode pipeline \
#     --config benchmark/iso_solve/config.yaml --limit 5

# python -m benchmark.iso_solve.run_benchmark --mode direct \
#     --config benchmark/iso_solve/config.yaml --limit 5

# --- Dataset ---
# First run downloads from HuggingFace and caches locally.
# Override with --dataroot to use a local file.
dataset:
  parquet_url: "hf://datasets/qwedsacf/competition_math/data/train-00000-of-00001-7320a6f3aba8ebd2.parquet"

# --- Filtering ---
filter:
  # subjects:                  # Uncomment to filter by subject(s):
  #   - Algebra                #   Prealgebra, Algebra, Number Theory,
  #   - Prealgebra             #   Counting & Probability, Geometry,
  #                            #   Intermediate Algebra, Precalculus
  levels:                    # Uncomment to filter by level(s) 1-5:
    - 3
    - 4
    - 5
  limit: 500                 # Max problems to evaluate (null = all 12498)
  seed: 42                    # Random seed for sampling

# --- LLM settings (for direct mode) ---
llm:
  model: null                # null = use global LLM config; set to override
  temperature: 0.0            # 0.0 = greedy / deterministic
  max_tokens: 4096            # Max output tokens per problem

# --- Concurrency (for direct mode) ---
concurrency: 10                # Parallel LLM requests

# --- Pipeline mode settings ---
pipeline:
  model: null                 # null = use llm.model; set to use a different model for pipeline
  max_tokens: null                # null = use llm.max_tokens → agents.yaml default
  temperature: null               # null = use llm.temperature → agents.yaml default
  language: en                # Prompt language for pipeline agents
  tools:                      # Tools available to the solver agent.
    - code_execute            # Only code execution; no RAG / web search.
    - reason                  # Deep reasoning without external tools.
                              # done and replan are always included.
                              # Set to null or remove to enable all tools.
  concurrency: 20              # Parallel pipeline runs (each uses ~10-20 LLM calls,
                              # keep low to avoid API rate limits)

# --- Output ---
output_dir: benchmark/iso_solve/results


# ======================================================================
# HLE (Humanity's Last Exam) Benchmark Configuration
# ======================================================================
# python -m benchmark.iso_solve.run_benchmark --benchmark hle --mode direct \
#     --config benchmark/iso_solve/config.yaml --limit 500 --sequential
#
# python -m benchmark.iso_solve.run_benchmark --benchmark hle --mode pipeline \
#     --config benchmark/iso_solve/config.yaml --limit 500 --sequential

hle:
  # --- Dataset ---
  parquet_url: "hf://datasets/cais/hle/data/test-00000-of-00001.parquet"
  skip_multimodal: false        # true = only evaluate text-only questions

  # --- Filtering ---
  filter:
    # subjects: []              # Uncomment to filter by subject(s)
    limit: null                # Max problems to evaluate (null = all ~2500)
    seed: 42

  # --- LLM settings (for direct mode) ---
  llm:
    model: qwen3.5-plus                 # null = use global LLM config; override for vision model
    multimodal: true            # true = send images to LLM; false = text-only
    temperature: 0.0
    max_tokens: 16384            # Official recommendation: >= 8192

  # --- Concurrency (for direct mode) ---
  concurrency: 50

  # --- Pipeline mode settings ---
  pipeline:
    model: qwen3.5-plus                # null = use llm.model; set to use a different model for pipeline
    max_tokens: 16384                   # null = use llm.max_tokens → agents.yaml default
    temperature: 0.0                    # null = use llm.temperature → agents.yaml default
    language: en
    tools:
      - code_execute
      - reason
    concurrency: 30


